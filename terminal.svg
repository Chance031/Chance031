<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
    </style>
    <clipPath id="rounded">
      <rect width="680" height="340" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- 배경 -->
    <rect width="680" height="340" fill="#1e1e1e"/>

    <!-- 상단 바 -->
    <rect width="680" height="36" fill="#2d2d2d"/>

    <!-- 신호등 점 -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>

    <!-- 타이틀 -->
    <text x="340" y="23" text-anchor="middle" fill="#888888" font-size="12" class="mono">Chance — Game Developer</text>

    <!-- $ whoami  y=62 -->
    <text x="24" y="62" fill="#28c840" font-size="14" class="mono">$</text>
    <text x="38" y="62" fill="#ffffff" font-size="14" class="mono">whoami</text>

    <!-- 출력 y=82, 100 -->
    <text x="24" y="82" fill="#aaaaaa" font-size="14" class="mono">&gt; Chance (찬스)</text>
    <text x="24" y="100" fill="#aaaaaa" font-size="14" class="mono">&gt; Game Systems Developer</text>

    <!-- $ Introducing  y=126 -->
    <text x="24" y="126" fill="#28c840" font-size="14" class="mono">$</text>
    <text x="38" y="126" fill="#ffffff" font-size="14" class="mono">Introducing</text>

    <!-- 출력 y=146 -->
    <text x="24" y="146" fill="#aaaaaa" font-size="13" class="mono">&gt; 게임의 동작 원리를 이해하고, 이를 시스템으로 설계하고 구현하는 개발자 찬스입니다.</text>

    <!-- $ git log  y=172 -->
    <text x="24" y="172" fill="#28c840" font-size="14" class="mono">$</text>
    <text x="38" y="172" fill="#ffffff" font-size="14" class="mono">git log --first-parent</text>

    <!-- 출력 y=192 -->
    <text x="24" y="192" fill="#aaaaaa" font-size="13" class="mono">&gt; 기본기부터 시작, 한 줄씩 이해하며 쌓는 중</text>

    <!-- $ grep  y=218 -->
    <text x="24" y="218" fill="#28c840" font-size="14" class="mono">$</text>
    <text x="38" y="218" fill="#ffffff" font-size="14" class="mono">grep -r "강점" ./chance</text>

    <!-- 출력 y=238 -->
    <text x="24" y="238" fill="#aaaaaa" font-size="13" class="mono">&gt; 꼼꼼함, 완성도, 끝까지 파고드는 스타일</text>

    <!-- $ status  y=264 -->
    <text x="24" y="264" fill="#28c840" font-size="14" class="mono">$</text>
    <text x="38" y="264" fill="#ffffff" font-size="14" class="mono">status</text>

    <!-- 출력 y=284 — 진행바 + 텍스트 -->
    <text x="24" y="284" fill="#aaaaaa" font-size="13" class="mono">&gt; [</text>
    <!-- 채워진 바 (6칸) -->
    <text x="51" y="284" fill="#28c840" font-size="13" class="mono">######</text>
    <!-- 빈 바 (4칸) -->
    <text x="99" y="284" fill="#444444" font-size="13" class="mono">....</text>
    <text x="127" y="284" fill="#aaaaaa" font-size="13" class="mono">]</text>
    <text x="143" y="284" fill="#aaaaaa" font-size="13" class="mono">still leveling up...</text>

    <!-- 커서 y=312 -->
    <text x="24" y="312" fill="#28c840" font-size="14" class="mono">$</text>
    <rect x="38" y="298" width="9" height="16" fill="#28c840">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
